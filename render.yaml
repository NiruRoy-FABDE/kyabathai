services:
  - type: web
    name: kyabathai-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: INGEST_SECRET
        sync: false
